# Full-stack docker-compose for local + simple production deployments.
#
# Brings up: TimescaleDB + Redis + Backend (FastAPI) + Frontend (nginx).
#
# For infra-only (when running backend/frontend natively for development),
# keep using `docker-compose.quant-infra.yml`.
#
# Quickstart:
#   cp .env.example .env
#   docker compose up -d --build
#   open http://localhost:3000
#
# Pin tags for reproducibility (override via TIMESCALE_TAG / REDIS_TAG env).

x-defaults: &defaults
  restart: unless-stopped
  networks:
    - quant-net

services:
  timescaledb:
    <<: *defaults
    image: timescale/timescaledb:${TIMESCALE_TAG:-latest-pg16}
    environment:
      POSTGRES_DB: ${TIMESCALE_DB:-quant_research}
      POSTGRES_USER: ${TIMESCALE_USER:-quant}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-quant_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${TIMESCALE_PORT:-5432}:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-quant} -d ${TIMESCALE_DB:-quant_research}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    <<: *defaults
    image: redis:${REDIS_TAG:-7-alpine}
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  backend:
    <<: *defaults
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: quant-trading-system/backend:${IMAGE_TAG:-dev}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: "false"
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_RELOAD: "false"
      DATABASE_URL: postgresql://${TIMESCALE_USER:-quant}:${TIMESCALE_PASSWORD:-quant_dev_password}@timescaledb:5432/${TIMESCALE_DB:-quant_research}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set in .env}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - backend_logs:/app/logs
      - backend_cache:/app/cache
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    <<: *defaults
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        REACT_APP_API_URL: /api
    image: quant-trading-system/frontend:${IMAGE_TAG:-dev}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  quant-net:
    driver: bridge

volumes:
  timescale_data:
  redis_data:
  backend_logs:
  backend_cache:
  backend_data:
