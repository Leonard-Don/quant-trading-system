name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend regression suite
        run: |
          pytest tests/unit tests/integration -q --cov=src --cov=backend --cov-report=xml

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Run frontend regression suite
        run: |
          CI=1 npm test -- --runInBand --watch=false src/__tests__

      - name: Build frontend
        run: npm run build

  research-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            tests/e2e/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Install research E2E dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Start local application
        run: |
          mkdir -p logs
          ./scripts/start_system.sh --force-port-cleanup &
          echo $! > logs/start-system.pid
          for i in {1..120}; do
            curl -fsS http://localhost:3000 >/dev/null && curl -fsS http://localhost:8000/health >/dev/null && exit 0
            sleep 1
          done
          echo "Local application did not become ready in time"
          exit 1

      - name: Run research E2E suite
        working-directory: tests/e2e
        run: |
          npm run verify:industry
          npm run verify:realtime

      - name: Stop local application
        if: always()
        run: ./scripts/stop_system.sh

      - name: Upload research E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: research-e2e-artifacts
          if-no-files-found: ignore
          path: |
            output/playwright/**
            logs/**
